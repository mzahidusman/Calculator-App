<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="calculator">
        <div class="title"><span class="titleText1">Scientific</span> <span class="titleText2">Calculator</span></div>
        <div class="screen">
            <input type="text" name="" id="displayinput" readonly placeholder="0">
        </div>
    <div class="bodycal">
        <div class="btnrow1">
            <button id="btn1" onclick="append('^2')">x²</button>
            <button id="btn2" onclick="append('π')">π</button>
            <button id="btn3" onclick="append('e')">e</button>
            <button id="btn4" onclick="backspace()">DEL</button>
            <button id="btn5" onclick="clearAll()">AC</button>
        </div>
        <div class="btnrow2">
            <button id="btn6" onclick="append('∛(')">∛</button>
            <button id="btn7" onclick="append('%')">%</button>
            <button id="btn8" onclick="append('sin(')">sin</button>
            <button id="btn9" onclick="append('cos(')">cos</button>
            <button id="btn10" onclick="append('tan(')">tan</button>
        </div>
        <div class="btnrow2">
            <button id="btn11" onclick="append('log(')">log</button>
            <button id="btn12" onclick="append('(')">(</button>
            <button id="btn13" onclick="append(')')">)</button>
            <button id="btn14" onclick="append('!')">n!</button>
            <button id="btn15" onclick="append('÷')">÷</button>
        </div>
        <div class="btnrow3">
            <button id="btn16" onclick="append('√(')">√x</button>
            <button id="btn17" onclick="append('7')">7</button>
            <button id="btn18" onclick="append('8')">8</button>
            <button id="btn19" onclick="append('9')">9</button>
            <button id="btn20" onclick="append('×')">× </button>
        </div>
        <div class="btnrow3">
            <button id="btn21" onclick="append('^3')">x³</button>
            <button id="btn22" onclick="append('4')">4</button>
            <button id="btn23" onclick="append('5')">5</button>
            <button id="btn24" onclick="append('6')">6</button>
            <button id="btn25" onclick="append('-')">−</button>
        </div>
        <div class="btnrow3">
            <button id="btn26" onclick="append('^')">xʸ</button>
            <button id="btn27" onclick="append('1')">1</button>
            <button id="btn28" onclick="append('2')">2</button>
            <button id="btn29" onclick="append('3')">3</button>
            <button id="btn30" onclick="append('+')">＋</button>
        </div>
        <div class="btnrow3">
            <button id="btn31" onclick="append('00')">00</button>
            <button id="btn32" onclick="negate()">∓</button>
            <button id="btn33" onclick="append('0')">0</button>
            <button id="btn34" onclick="append('.')">.</button>
            <button id="btn35" onclick="equal()">＝</button>
        </div>
    </div>
        
    </div>
    <script src="scripts.js">Script</script>
</body>
</html>
